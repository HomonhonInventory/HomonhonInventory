services:
  - type: web
    name: warehouse-inventory
    env: php
    plan: free
    region: singapore # Choose the region closest to you
    buildCommand: echo "Ready to deploy"
    startCommand: apache2-foreground
    envVars:
      - key: DB_HOST
        sync: false # You will set this in Render Dashboard
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_PORT
        value: 5432
